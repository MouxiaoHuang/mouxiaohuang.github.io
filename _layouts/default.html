<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <script>
      (function () {
        // Apply persisted theme mode (if any) before paint.
        try {
          var mode = localStorage.getItem("theme-mode"); // "system" | "dark" | "light" | null
          if (mode === "dark" || mode === "light") {
            document.documentElement.setAttribute("data-theme", mode);
            return;
          }
          if (mode === "system") {
            document.documentElement.removeAttribute("data-theme");
            return;
          }
          // Legacy support: older manual toggle stored theme + flag
          var t = localStorage.getItem("theme"); // "light" | "dark" | null
          var manual = localStorage.getItem("theme-manual"); // "1" | null
          if (manual === "1" && (t === "light" || t === "dark")) {
            document.documentElement.setAttribute("data-theme", t);
            localStorage.setItem("theme-mode", t);
          }
        } catch (e) {}
      })();
    </script>
    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
    <link rel="shortcut icon" type="image/x-icon" sizes="16x16" href="../favicon.ico"/>

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
    <meta name="google-site-verification" content="eOXraHsZvRFewg0qZd9amM9JatmqkayB53MdHVzCx0E" />
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">

        <header class="masthead clearfix">
          <!-- <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" /></a> -->

          <!-- <nav>

           <a href="{{ site.baseurl }}/">Blog</a>
            <a href="{{ site.baseurl }}/about">About</a>

          </nav> -->


          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>


          <nav>
            <a href="{{ site.baseurl }}/#Education">Education</a>
            <a href="{{ site.baseurl }}/#Experience">Work</a>
            <a href="{{ site.baseurl }}/#Research">Research</a>
            <a href="{{ site.baseurl }}/#Awards">Awards</a>
            <a href="{{ site.baseurl }}/#Contact">Contact</a>
            <a href="../Resume_Mouxiao_Huang.pdf">CV</a>
            <button class="theme-toggle" type="button" id="theme-toggle" aria-label="切换主题">主题</button>
          </nav>
        </header>

      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <!-- <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div> -->

    {% include analytics.html %}

    <script>
      (function () {
        var btn = document.getElementById("theme-toggle");
        if (!btn) return;

        function systemTheme() {
          try {
            return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          } catch (e) {
            return "light";
          }
        }

        function getMode() {
          var mode = null;
          try { mode = localStorage.getItem("theme-mode"); } catch (e) {}
          if (mode === "system" || mode === "dark" || mode === "light") return mode;
          return "system";
        }

        function setMode(mode) {
          if (mode === "dark" || mode === "light") {
            document.documentElement.setAttribute("data-theme", mode);
          } else {
            document.documentElement.removeAttribute("data-theme");
          }
          try {
            localStorage.setItem("theme-mode", mode);
            // Cleanup legacy keys
            localStorage.removeItem("theme");
            localStorage.removeItem("theme-manual");
          } catch (e) {}
        }

        function updateLabel() {
          var mode = getMode();
          var effective = mode === "system" ? systemTheme() : mode;
          var icon = mode === "system" ? "⚙️" : (mode === "dark" ? "🌙" : "☀️");
          btn.textContent = icon;
          btn.setAttribute(
            "aria-label",
            "Theme mode: " + mode + " (current: " + effective + ")"
          );
          btn.title = "Theme: " + mode + " — click to change";
        }

        btn.addEventListener("click", function () {
          var mode = getMode();
          var next = mode === "system" ? "dark" : (mode === "dark" ? "light" : "system");
          setMode(next);
          updateLabel();
        });

        // Keep label correct when system theme changes
        try {
          var mql = window.matchMedia("(prefers-color-scheme: dark)");
          if (mql && mql.addEventListener) {
            mql.addEventListener("change", function () {
              if (getMode() === "system") updateLabel();
            });
          } else if (mql && mql.addListener) {
            mql.addListener(function () {
              if (getMode() === "system") updateLabel();
            });
          }
        } catch (e) {}

        updateLabel();
      })();
    </script>
  </body>
</html>
